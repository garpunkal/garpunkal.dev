name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Triggered manually from Squidex
  workflow_dispatch:
    inputs:
      content_id:
        description: 'Content ID from Squidex'
        required: false
      schema:
        description: 'Schema name'
        required: false
      event_type:
        description: 'Squidex event (Created, Updated, Published...)'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Debug Squidex Trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Triggered by Squidex!"
          echo "Content ID : ${{ inputs.content_id }}"
          echo "Schema     : ${{ inputs.schema }}"
          echo "Event Type : ${{ inputs.event_type }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          SQUIDEX_KEY: ${{ secrets.SQUIDEX_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

      - name: Disable Jekyll
        run: touch ./dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5